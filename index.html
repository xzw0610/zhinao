<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>智脑 · 炫酷首页</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #050b14;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, system-ui, sans-serif;
            color: white;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .ui-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
            padding-top: env(safe-area-inset-top);
        }
        .header {
            padding: calc(20px + env(safe-area-inset-top)) 20px 10px;
            pointer-events: auto;
            backdrop-filter: blur(15px);
            background: rgba(20, 30, 50, 0.3);
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .subtitle {
            margin: 5px 0 0;
            opacity: 0.9;
            font-size: 14px;
        }
        .grid-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            pointer-events: none;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            pointer-events: auto;
        }
        .glass-card {
            backdrop-filter: blur(20px);
            background: rgba(20, 30, 45, 0.4);
            border-radius: 24px;
            padding: 18px 12px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
            color: white;
            text-align: center;
        }
        .glass-card:active {
            transform: scale(0.97);
            background: rgba(40, 60, 90, 0.5);
        }
        .glass-card .icon {
            font-size: 32px;
            margin-bottom: 8px;
        }
        .glass-card .title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }
        .glass-card .desc {
            font-size: 11px;
            opacity: 0.8;
        }
        .bottom-bar {
            display: flex;
            gap: 12px;
            pointer-events: auto;
        }
        .bottom-btn {
            flex: 1;
            backdrop-filter: blur(20px);
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 40px;
            padding: 14px 0;
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .bottom-btn:active {
            background: rgba(255,255,255,0.3);
        }
        .toast-message {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(20px);
            padding: 14px 20px;
            border-radius: 40px;
            color: white;
            text-align: center;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 20;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .offline-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0f1a url('x.png') center/cover;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 0 2px 10px black;
        }
        .offline-container h2 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .retry-btn {
            margin-top: 30px;
            padding: 12px 30px;
            background: #007aff;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="offlineOverlay" class="offline-container">
        <h2>🌐 网络连接断开</h2>
        <p>请检查网络后重试</p>
        <button class="retry-btn" onclick="window.location.reload()">重新加载</button>
    </div>

    <div class="ui-panel">
        <div class="header">
            <h1>
                <span>🧠 智脑</span>
            </h1>
            <div class="subtitle">v1.0.0 · 全知全能</div>
        </div>

        <div class="grid-container">
            <div class="card-grid">
                <div class="glass-card" onclick="takePhoto()">
                    <div class="icon">📷</div>
                    <div class="title">拍照</div>
                    <div class="desc">捕获瞬间</div>
                </div>
                <div class="glass-card" onclick="pickFromGallery()">
                    <div class="icon">🖼️</div>
                    <div class="title">相册</div>
                    <div class="desc">选择图片</div>
                </div>
                <div class="glass-card" onclick="getLocation()">
                    <div class="icon">📍</div>
                    <div class="title">定位</div>
                    <div class="desc">获取位置</div>
                </div>
                <div class="glass-card" onclick="startRecord()">
                    <div class="icon">🎤</div>
                    <div class="title">录音</div>
                    <div class="desc">3秒音频</div>
                </div>
                <div class="glass-card" onclick="writeFile()">
                    <div class="icon">📝</div>
                    <div class="title">写文件</div>
                    <div class="desc">保存数据</div>
                </div>
                <div class="glass-card" onclick="readFile()">
                    <div class="icon">📂</div>
                    <div class="title">读文件</div>
                    <div class="desc">查看内容</div>
                </div>
            </div>

            <div class="bottom-bar">
                <div class="bottom-btn" onclick="showToast('✨ 功能开发中')">AI 助手</div>
                <div class="bottom-btn" onclick="showToast('⚙️ 设置')">设置</div>
            </div>
        </div>
    </div>

    <div id="globalToast" class="toast-message"></div>

    <script type="text/javascript" src="cordova.js"></script>
    <script>
        // ---------- Three.js 粒子背景 ----------
        (function initThree() {
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b14);
            
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);
            
            function createParticleTexture() {
                const canvas = document.createElement('canvas');
                canvas.width = 64;
                canvas.height = 64;
                const ctx = canvas.getContext('2d');
                const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
                gradient.addColorStop(0, 'rgba(255,255,255,1)');
                gradient.addColorStop(0.5, 'rgba(100,180,255,0.9)');
                gradient.addColorStop(1, 'rgba(60,120,255,0)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 64, 64);
                return new THREE.CanvasTexture(canvas);
            }
            
            const particleTexture = createParticleTexture();
            
            const particlesGeo = new THREE.BufferGeometry();
            const count = 3000;
            const positions = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);
            
            const color1 = new THREE.Color(0x4a7db4);
            const color2 = new THREE.Color(0x9f5bb4);
            const color3 = new THREE.Color(0x3cc6b0);
            
            for (let i = 0; i < count; i++) {
                const r = 20 + Math.random() * 40;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                
                let px = r * Math.sin(phi) * Math.cos(theta);
                let py = r * Math.sin(phi) * Math.sin(theta) * 0.6;
                let pz = r * Math.cos(phi);
                
                if (Math.random() > 0.7) {
                    px = (Math.random() - 0.5) * 100;
                    py = (Math.random() - 0.5) * 80;
                    pz = (Math.random() - 0.5) * 100;
                }
                
                positions[i*3] = px;
                positions[i*3+1] = py;
                positions[i*3+2] = pz;
                
                let color;
                const rand = Math.random();
                if (rand < 0.4) color = color1;
                else if (rand < 0.75) color = color2;
                else color = color3;
                
                colors[i*3] = color.r;
                colors[i*3+1] = color.g;
                colors[i*3+2] = color.b;
            }
            
            particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particlesGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            
            const particlesMat = new THREE.PointsMaterial({
                size: 0.25,
                map: particleTexture,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            
            const particles = new THREE.Points(particlesGeo, particlesMat);
            scene.add(particles);
            
            const glowSphere = new THREE.Mesh(
                new THREE.SphereGeometry(3, 32, 16),
                new THREE.MeshBasicMaterial({ color: 0x2a4a7f, transparent: true, opacity: 0.15, wireframe: true })
            );
            scene.add(glowSphere);
            
            const starsGeo = new THREE.BufferGeometry();
            const starsPos = new Float32Array(800 * 3);
            for (let i = 0; i < 800; i++) {
                starsPos[i*3] = (Math.random() - 0.5) * 200;
                starsPos[i*3+1] = (Math.random() - 0.5) * 200;
                starsPos[i*3+2] = (Math.random() - 0.5) * 200;
            }
            starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
            const starsMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true });
            const stars = new THREE.Points(starsGeo, starsMat);
            scene.add(stars);
            
            let mouseX = 0, mouseY = 0;
            window.addEventListener('mousemove', (e) => {
                mouseX = (e.clientX / window.innerWidth) * 2 - 1;
                mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
            });
            
            function animate() {
                requestAnimationFrame(animate);
                
                particles.rotation.y += 0.0008;
                particles.rotation.x += 0.0002;
                stars.rotation.y -= 0.0003;
                glowSphere.rotation.x += 0.002;
                glowSphere.rotation.y += 0.003;
                
                camera.position.x += (mouseX * 8 - camera.position.x) * 0.02;
                camera.position.y += (mouseY * 5 - camera.position.y) * 0.02;
                camera.lookAt(0, 0, 0);
                
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();

        // ---------- GSAP 入场动画 ----------
        window.addEventListener('load', () => {
            gsap.from('.header', { y: -50, opacity: 0, duration: 1, ease: 'power3.out' });
            gsap.from('.glass-card', { scale: 0.8, opacity: 0, duration: 0.8, stagger: 0.05, ease: 'back.out(1.2)' });
            gsap.from('.bottom-btn', { y: 30, opacity: 0, duration: 0.8, delay: 0.3, stagger: 0.1 });
        });

        // ---------- 轻提示 ----------
        function showToast(msg, duration = 2000) {
            const toast = document.getElementById('globalToast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.opacity = '0';
            }, duration);
        }

        // ---------- Cordova 功能 ----------
        document.addEventListener('deviceready', onDeviceReady, false);
        function onDeviceReady() {
            console.log('Cordova 已就绪');
            if (window.StatusBar) {
                StatusBar.overlaysWebView(true);
                StatusBar.styleLightContent();
                StatusBar.backgroundColorByHexString('#050b14');
            }
        }
        
        function takePhoto() {
            navigator.camera.getPicture(
                (img) => showToast('✅ 拍照成功'),
                (err) => showToast('❌ 拍照失败: ' + err),
                { destinationType: Camera.DestinationType.DATA_URL, sourceType: Camera.PictureSourceType.CAMERA }
            );
        }
        function pickFromGallery() {
            navigator.camera.getPicture(
                (img) => showToast('✅ 已选择图片'),
                (err) => showToast('❌ 选择失败'),
                { destinationType: Camera.DestinationType.DATA_URL, sourceType: Camera.PictureSourceType.PHOTOLIBRARY }
            );
        }
        function getLocation() {
            navigator.geolocation.getCurrentPosition(
                (pos) => showToast(`📍 纬度: ${pos.coords.latitude.toFixed(4)}，经度: ${pos.coords.longitude.toFixed(4)}`),
                (err) => showToast('❌ 定位失败')
            );
        }
        var mediaRec = null;
        function startRecord() {
            if (mediaRec) { mediaRec.stopRecord(); mediaRec.release(); }
            mediaRec = new Media('test.wav', () => showToast('✅ 录音完成'), (err) => showToast('❌ 录音失败'));
            mediaRec.startRecord();
            showToast('🔴 录音中... 3秒');
            setTimeout(() => { if (mediaRec) { mediaRec.stopRecord(); mediaRec.release(); mediaRec = null; } }, 3000);
        }
        function writeFile() {
            window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, (fs) => {
                fs.root.getFile('test.txt', { create: true }, (fileEntry) => {
                    fileEntry.createWriter((writer) => {
                        writer.onwriteend = () => showToast('✅ 文件写入成功');
                        writer.write('智脑测试数据 - ' + new Date());
                    });
                });
            });
        }
        function readFile() {
            window.requestFileSystem(LocalFileSystem.PERSISTENT, 0, (fs) => {
                fs.root.getFile('test.txt', { create: false }, (fileEntry) => {
                    fileEntry.file((file) => {
                        const reader = new FileReader();
                        reader.onloadend = () => showToast('📄 ' + reader.result);
                        reader.readAsText(file);
                    });
                }, () => showToast('❌ 文件不存在'));
            });
        }

        // ---------- 离线检测 ----------
        (function() {
            const offlineOverlay = document.getElementById('offlineOverlay');
            function updateOnlineStatus() {
                if (navigator.onLine) {
                    offlineOverlay.style.display = 'none';
                } else {
                    offlineOverlay.style.display = 'flex';
                }
            }
            window.addEventListener('online', updateOnlineStatus);
            window.addEventListener('offline', updateOnlineStatus);
            updateOnlineStatus();
        })();
    </script>
</body>
</html>
